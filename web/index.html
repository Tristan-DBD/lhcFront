<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LHC">

  <!-- Stratégie de cache anti-blocage pour les mises à jour automatiques -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <!-- Service Worker Update Strategy -->
  <meta name="service-worker-update" content="force" />
  <meta name="flutter-service-worker" content="/flutter_service_worker.js" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LHC">
  <link rel="apple-touch-icon" href="/app-logo-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/app-logo-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/app-logo-512.png">

  <!-- Favicon et icônes PWA -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-new.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/app-logo-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/app-logo-512.png">
  <link rel="shortcut icon" href="/favicon-new.png">

  <title>LHC</title>
  <link rel="manifest" href="/lhc-verified-v5.json">

  <style>
    body {
      inset: 0;
      overflow: hidden;
      margin: 0;
      padding: 0;
      position: fixed;
      user-select: none;
      touch-action: none;
      background-color: #000; /* Fond noir profond */
    }

    #loading {
      align-items: center;
      display: flex;
      justify-content: center;
      height: 100%;
      width: 100%;
      background: radial-gradient(circle, #0175C2 0%, #000 70%); /* Dégradé radial avec votre bleu */
      transition: opacity 0.4s ease-out;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
    }

    .logo-container {
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }

    #loading img {
      width: 200px; /* Ajustez selon vos besoins */
      height: auto;
      filter: drop-shadow(0 0 15px rgba(1, 117, 194, 0.6)); /* Lueur bleue */
    }

    /* Animation de pulsation douce */
    @keyframes pulse {
      0% {
        transform: scale(1);
        filter: drop-shadow(0 0 15px rgba(1, 117, 194, 0.4));
      }
      50% {
        transform: scale(1.05);
        filter: drop-shadow(0 0 30px rgba(1, 117, 194, 0.8));
      }
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 15px rgba(1, 117, 194, 0.4));
      }
    }

    .loading-bar {
      position: absolute;
      bottom: 20%;
      width: 150px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar::after {
      content: "";
      position: absolute;
      left: -50%;
      width: 50%;
      height: 100%;
      background: #0175C2;
      animation: progress 1.5s infinite linear;
    }

    @keyframes progress {
      0% { left: -50%; }
      100% { left: 100%; }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="logo-container">
      <img src="logoLhc.png" alt="LHC Logo">
    </div>
    <div class="loading-bar"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Configuration de la stratégie de mise à jour du Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/flutter_service_worker.js')
          .then(function(registration) {
            console.log('ServiceWorker registration successful');
            
            // Vérifier les mises à jour après un court délai pour éviter les erreurs d'état invalide
            setTimeout(() => {
              if (registration.active) {
                registration.update().catch(err => console.log('SW update failed:', err));
              }
            }, 1000);
            
            // Vérification périodique (toutes les heures)
            setInterval(() => {
              registration.update();
            }, 3600000);

            // Gérer la mise à jour trouvée
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              if (installingWorker == null) return;
              
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    // Une nouvelle version est disponible et prête à être activée
                    console.log('New version installed and ready. Waiting for activation...');
                    // Le message 'SKIP_WAITING' est envoyé par Flutter dans le SW par défaut
                  }
                }
              };
            };
          })
          .catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });

        // Recharger automatiquement quand le nouveau Service Worker prend le contrôle
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          console.log('New Service Worker activated. Reloading page...');
          refreshing = true;
          window.location.reload();
        });
      });
    }

    // Fonction pour enlever l'écran de chargement
    window.addEventListener('flutter-first-frame', function() {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.remove();
        }, 400);
      }
    });
  </script>
</body>

</html>
